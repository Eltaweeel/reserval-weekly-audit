name: Weekly Reserval Audit (Playwright)

on:
  workflow_dispatch:
  schedule:
    # Run at 07:00 and 08:00 UTC every Monday.
    # Only one of these will match 10:00 Cairo depending on DST.
    - cron: "0 7 * * 1"
    - cron: "0 8 * * 1"

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gate (run only at 10:00 Cairo)
        id: gate
        shell: bash
        run: |
          node - <<'NODE'
          const parts = new Intl.DateTimeFormat('en-GB', {
            timeZone: 'Africa/Cairo',
            weekday: 'short',
            hour: '2-digit',
            minute: '2-digit',
            hour12: false
          }).formatToParts(new Date());
          const get = (t) => (parts.find(p => p.type === t)?.value || '');
          const shouldRun =
            get('weekday').toLowerCase().startsWith('mon') &&
            get('hour') === '10' &&
            get('minute') === '00';
          require('fs').appendFileSync(process.env.GITHUB_OUTPUT, `run=${shouldRun}\n`);
          console.log(`Cairo time: ${get('weekday')} ${get('hour')}:${get('minute')} run=${shouldRun}`);
          NODE

      - name: Setup Node
        if: github.event_name == 'workflow_dispatch' || steps.gate.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        if: github.event_name == 'workflow_dispatch' || steps.gate.outputs.run == 'true'
        run: npm ci

      - name: Install Playwright browsers
        if: github.event_name == 'workflow_dispatch' || steps.gate.outputs.run == 'true'
        run: npx playwright install --with-deps

      - name: Run audit
        if: github.event_name == 'workflow_dispatch' || steps.gate.outputs.run == 'true'
        env:
          BASE_URL: "https://www.reserval.com"
        run: npx playwright test --config=playwright.config.ts

      - name: Upload artifacts
        if: github.event_name == 'workflow_dispatch' || steps.gate.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: reserval-weekly-audit
          path: artifacts
          retention-days: 90
